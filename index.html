<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuvana Group — The World Awaits</title>
  <meta name="description" content="Welcome to the Nuvana Ecosystem. Choose Nuvana.go for curated travel experiences, or Nuvana.ex for premium global logistics." />
  
  <link href="https://api.fontshare.com/v2/css?f[]=chillax@300,400,500,600,700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
  
  <style>
    :root {
      --bg: #050b14;
      --go-accent: #027385;
      --ex-accent: #f99523;
      --text: #ffffff;
      --font-display: 'Chillax', sans-serif;
      --font-body: 'Inter', sans-serif;
      
      /* Loader specific variables */
      --brand-orange: #f99523;
      --path-length: 2725;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden; /* Prevents scrolling on the hub page */
      display: flex;
      flex-direction: column;
    }

    /* ─── CINEMATIC INTRO ─── */
    .intro-curtain-left, .intro-curtain-right {
      position: fixed;
      top: 0; bottom: 0;
      width: 50vw;
      background: var(--bg);
      z-index: 9998;
      /* Animates out after the logo pulse finishes (at 2.8s) */
      animation: splitOpen 1.2s cubic-bezier(0.77, 0, 0.175, 1) 2.8s forwards;
    }
    .intro-curtain-left { left: 0; transform-origin: left; }
    .intro-curtain-right { right: 0; transform-origin: right; border-left: 1px solid rgba(255,255,255,0.05); }

    @keyframes splitOpen {
      0% { transform: scaleX(1); }
      100% { transform: scaleX(0); }
    }

    .intro-logo-wrap {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
      animation: hideWrap 0s 2.8s forwards;
    }
    @keyframes hideWrap { to { visibility: hidden; opacity: 0; } }

    /* SVG Path Loader */
    .nx-logo-svg {
      width: clamp(150px, 20vw, 220px);
      height: auto;
      overflow: visible;
    }

    .nx-main-path {
      fill: none;
      stroke: var(--brand-orange);
      stroke-width: 8;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: var(--path-length); 
      stroke-dashoffset: var(--path-length);
      /* Snappy 2.8s duration running exactly once */
      animation: drawThenFill 2.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes drawThenFill {
      0% { 
          stroke-dashoffset: var(--path-length); 
          fill: rgba(249, 149, 35, 0); 
          opacity: 0; 
          transform: scale(0.98);
      }
      5% { 
          opacity: 1; 
      }
      45% { 
          stroke-dashoffset: 0; 
          fill: rgba(249, 149, 35, 0); 
          filter: drop-shadow(0 0 0px var(--brand-orange));
      }
      55% { 
          stroke-dashoffset: 0; 
          fill: rgba(249, 149, 35, 1);
          filter: drop-shadow(0 0 20px rgba(249, 149, 35, 0.5));
          transform: scale(1.04);
      }
      85% { 
          stroke-dashoffset: 0; 
          fill: rgba(249, 149, 35, 1);
          filter: drop-shadow(0 0 25px rgba(249, 149, 35, 0.6));
          transform: scale(1.04);
          opacity: 1;
      }
      100% { 
          opacity: 0; 
          transform: scale(1.1); 
          fill: rgba(249, 149, 35, 1);
          stroke-dashoffset: 0;
      }
    }

    /* ─── LOGOS ─── */
    .panel-logo {
      height: clamp(55px, 8vw, 85px); /* Increased size since icons are removed */
      width: auto;
      margin: 0 auto 1.5rem auto;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
      transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    /* ─── SPLIT CONTAINER ─── */
    .split-container {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    .panel {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      transition: flex 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94), filter 0.8s ease;
    }
    
    /* Backgrounds with entrance animation */
    .panel-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      z-index: 0;
      transition: transform 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      animation: bgSettle 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) 2.8s backwards;
    }
    @keyframes bgSettle {
      0% { transform: scale(1.2); filter: blur(15px); }
      100% { transform: scale(1); filter: blur(0); }
    }
    
    .panel-overlay {
      position: absolute; inset: 0; z-index: 1;
      transition: opacity 0.6s ease, background 0.6s ease;
    }

    /* Nuvana.go (Travel) styling */
    .panel-go .panel-bg { background-image: url('https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=1600&auto=format&fit=crop&q=80'); }
    .panel-go .panel-overlay { background: linear-gradient(to bottom, rgba(13,35,48,0.3), rgba(13,35,48,0.95)); }
    
    /* Nuvana.ex (Logistics) styling */
    .panel-ex .panel-bg { background-image: url('assets/ex43.jpeg'); }
    .panel-ex .panel-overlay { background: linear-gradient(to bottom, rgba(5,11,20,0.3), rgba(5,11,20,0.95)); }

    .panel-content {
      position: relative; z-index: 2;
      text-align: center; padding: 2rem;
      transform: translateY(20px);
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.5s ease;
      animation: contentFade 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) 3.4s backwards;
    }
    @keyframes contentFade {
      0% { opacity: 0; margin-top: 30px; }
      100% { opacity: 1; margin-top: 0; }
    }

    .panel-title {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.02em;
    }
    .panel-title span.dot { transition: color 0.4s ease; }
    
    .panel-desc {
      font-size: 1.05rem; color: rgba(255,255,255,0.7);
      max-width: 380px; margin: 0 auto 2rem;
      opacity: 0; transform: translateY(10px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .enter-btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 1rem 2.5rem; border-radius: 50px;
      font-weight: 600; font-size: 1rem; color: var(--text);
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      opacity: 0; transform: translateY(10px);
      transition: all 0.5s ease;
    }

    /* Hover Interactions */
    .panel:hover { flex: 1.4; } 
    .panel:hover .panel-bg { transform: scale(1.05); }
    
    .panel-go:hover .panel-overlay { background: linear-gradient(to bottom, rgba(13,35,48,0.2), rgba(2,115,133,0.85)); }
    .panel-ex:hover .panel-overlay { background: linear-gradient(to bottom, rgba(5,11,20,0.2), rgba(249,149,35,0.85)); }
    
    .panel:hover .panel-content { transform: translateY(0); }
    .panel:hover .panel-logo { transform: scale(1.08) translateY(-3px); }
    
    .panel:hover .panel-desc { opacity: 1; transform: translateY(0); color: var(--text); }
    .panel:hover .enter-btn { opacity: 1; transform: translateY(0); background: var(--text); color: var(--bg); border-color: transparent;}

    .split-container:hover .panel:not(:hover) { filter: brightness(0.4) grayscale(0.5); }

    /* ─── EXIT TRANSITION ANIMATIONS ─── */
    .panel.exiting-active {
      flex: 100 !important;
      z-index: 50;
      cursor: default;
    }
    .panel.exiting-active .panel-overlay {
      background: var(--bg) !important;
      opacity: 1 !important;
      transition: background 0.8s ease, opacity 0.8s ease;
    }
    .panel.exiting-active .panel-content {
      opacity: 0 !important;
      transform: scale(1.1) translateY(-20px) !important;
    }
    .panel.exiting-active .panel-bg {
      transform: scale(1.1);
      filter: blur(10px);
    }
    .panel.exiting-inactive {
      flex: 0.0001 !important;
      opacity: 0 !important;
      pointer-events: none;
    }

    @media (max-width: 768px) {
      .split-container { flex-direction: column; }
      
      .panel { flex: 1; }
      .panel:hover { flex: 1.1; }
      
      .panel-content { transform: translateY(0); padding: 1.5rem; }
      .panel-logo { height: 50px; margin-bottom: 0.5rem; }
      .panel-title { font-size: 2.5rem; }
      .panel-desc { display: none; }
      
      .enter-btn { opacity: 1; transform: translateY(0); padding: 0.8rem 2rem; background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
      
      .panel-go .panel-overlay { background: linear-gradient(to bottom, rgba(13,35,48,0.4), rgba(13,35,48,0.9)); }
      .panel-ex .panel-overlay { background: linear-gradient(to top, rgba(5,11,20,0.4), rgba(5,11,20,0.9)); }
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════ CINEMATIC INTRO ══════════════════════════════════ -->
  <!-- Left and right dark panels that split open like curtains -->
  <div class="intro-curtain-left"></div>
  <div class="intro-curtain-right"></div>
  
  <!-- Centered drawing SVG logo that fades out right before curtains open -->
  <div class="intro-logo-wrap">
    <svg class="nx-logo-svg" viewBox="0 0 850 850">
        <path class="nx-main-path" d="M 126.3 623.3 L 246 623.3 C 255.7 623.3 262.9 614.1 260.5 604.7 L 174 258.2 C 171.6 248.7 178.8 239.6 188.5 239.6 L 310.5 239.6 C 341.5 239.6 369.9 257.1 383.8 284.9 L 521.9 561.2 C 540.9 599.3 579.8 623.3 622.4 623.3 L 767.3 623.3 C 778.7 623.3 785.9 611 780.4 601 L 585 249.4 C 565.2 213.7 527.6 191.6 486.8 191.6 L 126.3 191.6 C 97 191.6 73.4 215.3 73.4 244.5 L 73.4 570.4 C 73.4 599.6 97.1 623.3 126.3 623.3 Z" />
    </svg>
  </div>

  <!-- ══════════════════════════════════ MAIN CONTENT ══════════════════════════════════ -->
  
  <!-- The Split Screen Layout -->
  <div class="split-container">
    
    <!-- Left: Travel / Nuvana.go Panel -->
    <a href="nuvanago.html" class="panel panel-go" aria-label="Enter Nuvana.go Travel">
      <div class="panel-bg"></div>
      <div class="panel-overlay"></div>
      
      <div class="panel-content">
        <img src="assets/nuvana.go logo full.svg" alt="Nuvana.go" class="panel-logo" onerror="this.onerror=null; this.outerHTML='<h2 class=\'panel-title\'>Nuvana<span class=\'dot\'>.</span>go</h2>';">
        <p class="panel-desc">Curated travel experiences, unforgettable journeys, and seamless global travel planning.</p>
        <div class="enter-btn">
          Discover the World <span class="material-symbols-rounded">arrow_forward</span>
        </div>
      </div>
    </a>

    <!-- Right: Logistics / Nuvana.ex Panel -->
    <a href="nuvanaex.html" class="panel panel-ex" aria-label="Enter Nuvana.ex Logistics">
      <div class="panel-bg"></div>
      <div class="panel-overlay"></div>
      
      <div class="panel-content">
        <img src="assets/nuvana.ex logo full.svg" alt="Nuvana.ex" class="panel-logo" onerror="this.onerror=null; this.outerHTML='<h2 class=\'panel-title\'>Nuvana<span class=\'dot\'>.</span>ex</h2>';">
        <p class="panel-desc">Premium global logistics, secure excess baggage handling, and door-to-door courier services.</p>
        <div class="enter-btn">
          Ship Globally <span class="material-symbols-rounded">arrow_forward</span>
        </div>
      </div>
    </a>

  </div>

  <!-- Exit Transition Script -->
  <script>
    document.querySelectorAll('.panel').forEach(panel => {
      panel.addEventListener('click', function(e) {
        e.preventDefault(); // Stop immediate navigation
        
        // e.currentTarget ensures we get the href from the <a> tag, even if a child element was clicked
        const targetUrl = e.currentTarget.getAttribute('href');

        // Safety check to prevent routing errors
        if (!targetUrl || targetUrl === '' || targetUrl === '#') {
            console.error("Navigation cancelled: Target URL is empty or invalid.");
            return;
        }

        // Apply exit animation classes
        document.querySelectorAll('.panel').forEach(p => {
          if (p === e.currentTarget) {
            p.classList.add('exiting-active');
          } else {
            p.classList.add('exiting-inactive');
          }
        });

        // Wait for the animation to complete (800ms) before navigating
        setTimeout(() => {
          window.location.href = targetUrl;
        }, 800); 
      });
    });
  </script>
</body>
</html>
