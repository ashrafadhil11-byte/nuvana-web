<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nuvana.ex — Customer Portal</title>
  <meta name="description" content="Access your Nuvana.ex global logistics shipments, track active cargo, and view history." />
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#f9fafb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nuvana.ex">
  
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    /* ══ LIGHT THEME VARIABLES ══ */
    :root {
      --clr-bg: #f9fafb;         /* Gray 50 */
      --clr-surface: #ffffff;    /* White */
      --clr-text: #111827;       /* Gray 900 */
      --clr-text-muted: #6b7280; /* Gray 500 */
      --clr-border: #e5e7eb;     /* Gray 200 */
      
      --clr-primary: #027385;
      --clr-accent: #f99523;
      --clr-accent-light: #fbb360;
    }
    
    body { 
      font-family: 'Inter', sans-serif; 
      background: var(--clr-bg); 
      color: var(--clr-text); 
      overflow-x: hidden; 
      -webkit-tap-highlight-color: transparent; /* Removes default tap highlight */
      touch-action: manipulation; /* Optimizes touch responsiveness */
    }

    /* ══ PWA MICRO-ANIMATIONS & CARDS ══ */
    .surface-card {
      background: var(--clr-surface);
      border: 1px solid var(--clr-border);
      border-radius: 20px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s ease;
      cursor: pointer;
    }
    /* Touch down (active) state for native feel */
    .surface-card:active, .btn-active:active { 
      transform: scale(0.96); 
    }

    .gradient-text { 
      background: linear-gradient(135deg, var(--clr-accent), var(--clr-accent-light)); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent; 
    }

    /* ══ SCREEN TRANSITIONS ══ */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      transition: opacity 0.4s ease, transform 0.4s ease, visibility 0.4s;
      overflow-y: auto; overflow-x: hidden;
      background: var(--clr-bg);
    }
    .screen.hidden-screen {
      opacity: 0; visibility: hidden; pointer-events: none;
      transform: translateY(20px);
    }

    @keyframes slideUpFade {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes spin { 100% { transform: rotate(360deg); } }
    .animate-spin-slow { animation: spin 1s linear infinite; }

    /* ══ INPUT FIXES ══ */
    input:-webkit-autofill,
    input:-webkit-autofill:hover, 
    input:-webkit-autofill:focus, 
    input:-webkit-autofill:active {
        -webkit-box-shadow: 0 0 0 30px white inset !important;
        -webkit-text-fill-color: #111827 !important;
    }

    /* ══ TABS ══ */
    .tab-btn {
      color: var(--clr-text-muted); border-bottom: 2px solid transparent;
      transition: all 0.3s ease;
    }
    .tab-btn.active {
      color: var(--clr-accent); border-bottom-color: var(--clr-accent); font-weight: 700;
    }

    /* ══ TIMELINE CSS ══ */
    .timeline-container { position: relative; padding-left: 24px; margin-top: 1.5rem; }
    .timeline-container::before {
      content: ''; position: absolute; left: 7px; top: 10px; bottom: 0;
      width: 2px; background: var(--clr-border); border-radius: 2px;
    }
    .timeline-item { position: relative; margin-bottom: 2rem; }
    .timeline-item:last-child { margin-bottom: 0; }
    .timeline-dot {
      position: absolute; left: -24px; top: 4px;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--clr-surface); border: 3px solid var(--clr-border);
      transition: all 0.3s ease;
      z-index: 2;
    }
    .timeline-item.latest .timeline-dot {
      border-color: var(--clr-accent); background: var(--clr-surface);
      box-shadow: 0 0 0 4px rgba(249,149,35,0.1);
    }
    
    /* Hide scrollbar for PWA smoothness */
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════ AUTH SCREEN ══════════════════════════════════ -->
  <div id="auth-screen" class="screen z-20">
    <!-- Light Background Decor -->
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
      <div class="absolute top-[-5%] left-[-10%] w-[60vw] h-[60vw] bg-orange-500/5 blur-[80px] rounded-full"></div>
      <div class="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-[#027385]/5 blur-[80px] rounded-full"></div>
    </div>

    <div class="flex-1 flex flex-col justify-center items-center px-6 relative z-10">
      <img src="assets/nuvana.ex logo full.svg" alt="Nuvana.ex" class="h-10 md:h-12 w-auto object-contain mb-10" onerror="this.onerror=null; this.outerHTML='<div class=\'text-3xl font-bold tracking-tighter mb-10 text-gray-900\'>Nuvana<span class=\'text-orange-500\'>.ex</span></div>';">
      
      <div class="w-full max-w-sm surface-card p-8 rounded-3xl text-center animate-in cursor-default">
        <div class="w-16 h-16 rounded-full bg-orange-50 border border-orange-100 flex items-center justify-center mx-auto mb-6">
          <span class="material-symbols-rounded text-3xl text-orange-500">account_circle</span>
        </div>
        <h2 class="text-2xl font-extrabold text-gray-900 mb-2">Customer Portal</h2>
        <p class="text-gray-500 text-sm mb-8">Enter your registered mobile number to access your shipments.</p>
        
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="relative mb-6 text-left">
            <span class="material-symbols-rounded absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">call</span>
            <input type="tel" id="phone-input" class="w-full bg-white border border-gray-300 rounded-2xl py-4 pl-12 pr-4 text-gray-900 font-bold focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 transition-all shadow-sm" placeholder="e.g. +971 50 123 4567" required autocomplete="tel">
          </div>
          
          <button type="submit" id="login-btn" class="btn-active w-full bg-gradient-to-r from-orange-500 to-orange-400 text-white font-bold py-4 rounded-2xl shadow-[0_8px_20px_rgba(249,149,35,0.25)] flex items-center justify-center gap-2 transition-transform">
            <span>Secure Access</span>
            <span class="material-symbols-rounded" id="login-icon">login</span>
          </button>
        </form>

        <!-- Error Msg -->
        <div id="login-error" class="hidden mt-4 bg-red-50 border border-red-200 text-red-600 text-sm px-4 py-3 rounded-xl flex items-center gap-2 text-left">
          <span class="material-symbols-rounded text-lg shrink-0">error</span>
          <span id="login-error-text">No active shipments found for this number.</span>
        </div>
      </div>

      <div class="mt-12 text-gray-400 text-xs font-medium">
        Powered by Nuvana Group
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════ DASHBOARD SCREEN ══════════════════════════════════ -->
  <div id="dashboard-screen" class="screen hidden-screen z-10">
    
    <!-- Top Header -->
    <header class="bg-white/80 backdrop-blur-md sticky top-0 z-30 border-b border-gray-200 pt-safe-top">
      <div class="flex items-center justify-between px-6 py-4 max-w-3xl mx-auto">
        <div>
          <p class="text-gray-500 text-[11px] font-bold uppercase tracking-widest mb-0.5" id="time-greeting">Good Morning</p>
          <h1 class="text-xl font-extrabold text-gray-900 truncate max-w-[200px]" id="user-greeting">Customer</h1>
        </div>
        <button onclick="logout()" class="btn-active w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 transition hover:bg-red-50 hover:text-red-500">
          <span class="material-symbols-rounded">logout</span>
        </button>
      </div>
    </header>

    <!-- Main Content Scrollable Area -->
    <main class="flex-1 overflow-y-auto pb-12 px-4 md:px-6 pt-6 max-w-3xl mx-auto w-full">
      
      <!-- Stats Overview -->
      <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="surface-card p-5 relative overflow-hidden">
          <div class="absolute right-0 top-0 w-16 h-16 bg-orange-50 rounded-bl-full"></div>
          <span class="material-symbols-rounded text-orange-500 mb-2 block relative z-10">local_shipping</span>
          <h3 class="text-3xl font-black text-gray-900 relative z-10" id="stat-active">0</h3>
          <p class="text-gray-500 text-[10px] font-bold uppercase tracking-wider relative z-10">In Transit</p>
        </div>
        <div class="surface-card p-5 relative overflow-hidden">
          <div class="absolute right-0 top-0 w-16 h-16 bg-emerald-50 rounded-bl-full"></div>
          <span class="material-symbols-rounded text-emerald-500 mb-2 block relative z-10">check_circle</span>
          <h3 class="text-3xl font-black text-gray-900 relative z-10" id="stat-delivered">0</h3>
          <p class="text-gray-500 text-[10px] font-bold uppercase tracking-wider relative z-10">Delivered</p>
        </div>
      </div>

      <!-- Tabs -->
      <div class="flex border-b border-gray-200 mb-6">
        <button onclick="switchTab('active')" id="tab-active" class="tab-btn active flex-1 pb-3 text-sm flex justify-center items-center gap-2 btn-active">
          <span>Active</span>
          <span class="bg-orange-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full" id="badge-active">0</span>
        </button>
        <button onclick="switchTab('past')" id="tab-past" class="tab-btn flex-1 pb-3 text-sm flex justify-center items-center gap-2 btn-active">
          <span>Past</span>
          <span class="bg-gray-200 text-gray-600 text-[10px] font-bold px-1.5 py-0.5 rounded-full" id="badge-past">0</span>
        </button>
      </div>

      <!-- Lists -->
      <div id="list-active" class="space-y-4">
        <!-- Rendered via JS -->
      </div>
      
      <div id="list-past" class="space-y-4 hidden">
        <!-- Rendered via JS -->
      </div>

    </main>
  </div>

  <!-- ══════════════════════════════════ TRACKING MODAL ══════════════════════════════════ -->
  <div id="trackingModal" class="fixed inset-0 bg-gray-900/40 backdrop-blur-sm z-[2000] flex items-end md:items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
    <div class="bg-white w-full max-w-3xl rounded-t-[32px] md:rounded-3xl shadow-2xl p-6 md:p-10 relative transform translate-y-full md:translate-y-8 transition-transform duration-400 cubic-bezier(0.4, 0, 0.2, 1) max-h-[90vh] flex flex-col" id="trackingModalContent">
      
      <!-- Drag handle mobile -->
      <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6 md:hidden"></div>

      <!-- Close Btn -->
      <button onclick="closeTrackingModal()" class="btn-active absolute top-5 right-5 md:top-6 md:right-6 w-10 h-10 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center z-20">
        <span class="material-symbols-rounded">close</span>
      </button>
      
      <div id="trackingResultsTarget" class="overflow-y-auto flex-1 pr-2 pb-6 custom-scrollbar">
        <!-- Loader / Content injected here -->
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════ JAVASCRIPT ══════════════════════════════════ -->
  <script>
    // --- Global State ---
    let appData = {
      active: [],
      past: [],
      customerName: 'Customer'
    };

    // --- DOM Elements ---
    const authScreen = document.getElementById('auth-screen');
    const dashboardScreen = document.getElementById('dashboard-screen');
    const loginBtn = document.getElementById('login-btn');
    const loginIcon = document.getElementById('login-icon');
    const loginError = document.getElementById('login-error');
    const errorText = document.getElementById('login-error-text');

    const listActive = document.getElementById('list-active');
    const listPast = document.getElementById('list-past');
    const tabActive = document.getElementById('tab-active');
    const tabPast = document.getElementById('tab-past');

    // --- Utils: Maps & Formatters ---
    const emojiMap = {
      '🇮🇳': 'India', '🇦🇪': 'UAE', '🇴🇲': 'Oman',
      '🇸🇦': 'Saudi Arabia', '🇶🇦': 'Qatar', '🇧🇭': 'Bahrain',
      '🇰🇼': 'Kuwait', '🇺🇸': 'USA', '🇬🇧': 'UK', '🇨🇦': 'Canada'
    };

    const convertFlagToCountry = (str) => {
      if (!str) return '—';
      let res = String(str);
      for (const [emoji, name] of Object.entries(emojiMap)) {
        if (res.includes(emoji)) {
          res = res.replace(emoji, `${name}`);
        }
      }
      return res.trim();
    };

    const getVal = (data, matches, fallback = '') => {
      for (const key of Object.keys(data)) {
        if (matches.some(m => key.toLowerCase().includes(m.toLowerCase()))) {
          return data[key] || fallback;
        }
      }
      return fallback;
    };

    const formatOnlyDate = (dateStr) => {
      if (!dateStr || dateStr === '—') return dateStr;
      const d = new Date(dateStr);
      if (!isNaN(d.getTime())) {
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      }
      return String(dateStr).replace(/\s\d{1,2}:\d{2}.*/, '');
    };

    const extractTime = (dateStr) => {
      if (!dateStr || dateStr === '—') return '';
      const d = new Date(dateStr);
      if (!isNaN(d.getTime())) {
        return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
      }
      const match = String(dateStr).match(/\d{1,2}:\d{2}/);
      return match ? match[0] : '';
    };

    // Status logic refined for Light Mode styling
    const getProg = (str) => {
      const s = String(str).toLowerCase();
      // Red Error Flag
      if (s.includes('return') || s.includes('cancel') || s.includes('hold')) 
        return { step: 0, w: 0, c: '#EF4444', bg: 'bg-red-50 text-red-600 border-red-200', icon: 'error' };
      // Green Delivered Flag
      if (s.includes('deliver')) 
        return { step: 4, w: 100, c: '#10B981', bg: 'bg-emerald-50 text-emerald-600 border-emerald-200', icon: 'check_circle' };
      // Last Mile
      if (s.includes('out for delivery') || s.includes('to delivery station') || s.includes('last mile')) 
        return { step: 3, w: 75, c: '#f99523', bg: 'bg-orange-50 text-orange-600 border-orange-200', icon: 'local_shipping' };
      // Origin
      if (s.includes('pick') || s.includes('booked') || s.includes('origin')) 
        return { step: 1, w: 15, c: '#f99523', bg: 'bg-amber-50 text-amber-600 border-amber-200', icon: 'inventory_2' };
      // In-Transit Default
      return { step: 2, w: 50, c: '#f99523', bg: 'bg-orange-50 text-orange-600 border-orange-200', icon: 'flight_takeoff' }; 
    };

    // --- Authentication ---
    async function handleLogin(e) {
      e.preventDefault();
      const rawInput = document.getElementById('phone-input').value;
      // Strip everything except digits to handle spaces/symbols
      const cleanInput = rawInput.replace(/\D/g, ''); 
      if (!cleanInput) return;

      // Loading state
      loginError.classList.add('hidden');
      loginIcon.innerHTML = 'sync';
      loginIcon.classList.add('animate-spin-slow');
      loginBtn.classList.add('opacity-80', 'pointer-events-none');

      try {
        // Calling the API
        const apiUrl = `https://script.google.com/macros/s/AKfycbzn8cMCVzTpVOkN_8fTtH_5-TJdqBN8NJeB8iZSF4KX0ncFyEJXdLi984aYyZ8V9EW1/exec?id=${encodeURIComponent(cleanInput)}&tracking=${encodeURIComponent(cleanInput)}`;
        const response = await fetch(apiUrl);
        const data = await response.json();

        let matchingShipments = [];
        
        // Strict Client-Side Filter: Remove non-digits from all DB values and compare
        if (data && !Array.isArray(data) && Object.keys(data).length > 0 && !data.error) {
           const hasMatch = Object.values(data).some(val => val && val.toString().replace(/\D/g, '').includes(cleanInput));
           if(hasMatch) matchingShipments = [data];
        } else if (Array.isArray(data)) {
          matchingShipments = data.filter(pkg => {
            return Object.values(pkg).some(val => val && val.toString().replace(/\D/g, '').includes(cleanInput));
          });
        }

        if (matchingShipments.length === 0) {
          throw new Error("No shipments found.");
        }

        processShipmentData(matchingShipments);
        showDashboard();

      } catch (err) {
        console.error(err);
        errorText.textContent = "We couldn't locate any shipments linked to this mobile number.";
        loginError.classList.remove('hidden');
      } finally {
        loginIcon.innerHTML = 'login';
        loginIcon.classList.remove('animate-spin-slow');
        loginBtn.classList.remove('opacity-80', 'pointer-events-none');
      }
    }

    function processShipmentData(shipments) {
      appData.active = [];
      appData.past = [];
      
      // Extract Customer Full Name
      if(shipments.length > 0) {
        let name = getVal(shipments[0], ['shipper', 'sender', 'name', 'customer'], 'Customer');
        appData.customerName = name.trim();
      }

      // Categorize
      shipments.forEach(pkg => {
        const logs = pkg['Tracking_Logs'] || [];
        let status = getVal(pkg, ['status', 'state', 'condition'], '');
        
        if (!status || status.trim() === '') {
          status = logs.length > 0 ? (logs[logs.length - 1]['Status'] || 'In Transit') : 'Booked';
        }
        
        const prog = getProg(status);
        pkg._extractedStatus = status;
        pkg._prog = prog;

        if (prog.step === 4 || prog.step === 0) {
          appData.past.push(pkg);
        } else {
          appData.active.push(pkg);
        }
      });

      // Sort by date (newest first)
      const sortFn = (a, b) => {
        let dA = new Date(getVal(a, ['date', 'booking', 'created'], '1970')).getTime();
        let dB = new Date(getVal(b, ['date', 'booking', 'created'], '1970')).getTime();
        return dB - dA;
      };
      appData.active.sort(sortFn);
      appData.past.sort(sortFn);
    }

    // --- UI Navigation ---
    function showDashboard() {
      // Time-based Greeting
      const hr = new Date().getHours();
      let greeting = 'Good Evening';
      if (hr < 12) greeting = 'Good Morning';
      else if (hr < 18) greeting = 'Good Afternoon';

      document.getElementById('time-greeting').textContent = greeting;
      document.getElementById('user-greeting').textContent = appData.customerName;
      
      document.getElementById('stat-active').textContent = appData.active.length;
      document.getElementById('stat-delivered').textContent = appData.past.length;
      document.getElementById('badge-active').textContent = appData.active.length;
      document.getElementById('badge-past').textContent = appData.past.length;

      renderList('active', listActive);
      renderList('past', listPast);

      authScreen.classList.add('hidden-screen');
      setTimeout(() => {
        dashboardScreen.classList.remove('hidden-screen');
      }, 300);
    }

    function logout() {
      document.getElementById('phone-input').value = '';
      dashboardScreen.classList.add('hidden-screen');
      setTimeout(() => {
        authScreen.classList.remove('hidden-screen');
      }, 300);
    }

    function switchTab(tab) {
      if(tab === 'active') {
        tabActive.classList.add('active');
        tabPast.classList.remove('active');
        listActive.classList.remove('hidden');
        listPast.classList.add('hidden');
        
        document.getElementById('badge-active').classList.replace('bg-gray-200', 'bg-orange-500');
        document.getElementById('badge-active').classList.replace('text-gray-600', 'text-white');
        document.getElementById('badge-past').classList.replace('bg-orange-500', 'bg-gray-200');
        document.getElementById('badge-past').classList.replace('text-white', 'text-gray-600');
      } else {
        tabPast.classList.add('active');
        tabActive.classList.remove('active');
        listPast.classList.remove('hidden');
        listActive.classList.add('hidden');
        
        document.getElementById('badge-past').classList.replace('bg-gray-200', 'bg-orange-500');
        document.getElementById('badge-past').classList.replace('text-gray-600', 'text-white');
        document.getElementById('badge-active').classList.replace('bg-orange-500', 'bg-gray-200');
        document.getElementById('badge-active').classList.replace('text-white', 'text-gray-600');
      }
    }

    function renderList(type, container) {
      const dataArr = appData[type];
      if(dataArr.length === 0) {
        container.innerHTML = `
          <div class="text-center p-8 border-2 border-dashed border-gray-200 rounded-2xl">
            <span class="material-symbols-rounded text-4xl text-gray-300 mb-2">inbox</span>
            <p class="text-gray-500 text-sm font-medium">No ${type} shipments found.</p>
          </div>
        `;
        return;
      }

      let html = '';
      dataArr.forEach((pkg, index) => {
        const id = getVal(pkg, ['booking', 'tracking', 'id', 'reference'], 'Unknown').toUpperCase();
        const origin = convertFlagToCountry(getVal(pkg, ['origin', 'from', 'departure'], '—'));
        const dest = convertFlagToCountry(getVal(pkg, ['destination', 'to', 'arrival'], '—'));
        const dateRaw = getVal(pkg, ['date', 'booking', 'created'], '');
        const dateStr = formatOnlyDate(dateRaw);
        const status = pkg._extractedStatus;
        const prog = pkg._prog;

        window[`_pkg_${type}_${index}`] = pkg;

        html += `
          <div class="surface-card p-4 relative overflow-hidden group" onclick="openShipmentModal('${type}', ${index})">
            <!-- Very subtle glow hint -->
            <div class="absolute -right-6 -top-6 w-24 h-24 blur-2xl opacity-10" style="background-color: ${prog.c}"></div>
            
            <div class="flex justify-between items-start mb-4 relative z-10">
              <div>
                <p class="text-gray-400 text-[10px] uppercase font-bold tracking-widest mb-0.5">Tracking ID</p>
                <h4 class="text-lg font-black text-gray-900">${id}</h4>
              </div>
              <div class="px-2.5 py-1 rounded-md border text-[10px] font-bold uppercase tracking-wider ${prog.bg}">
                ${status}
              </div>
            </div>

            <div class="flex items-center gap-3 relative z-10 mb-4 bg-gray-50 rounded-xl p-3 border border-gray-100">
              <div class="flex-1">
                <p class="text-[10px] text-gray-400 uppercase font-bold mb-0.5">From</p>
                <p class="text-sm font-bold text-gray-800 truncate">${origin}</p>
              </div>
              <span class="material-symbols-rounded text-gray-300 text-xl">east</span>
              <div class="flex-1 text-right">
                <p class="text-[10px] text-gray-400 uppercase font-bold mb-0.5">To</p>
                <p class="text-sm font-bold text-gray-800 truncate">${dest}</p>
              </div>
            </div>

            <div class="flex justify-between items-center relative z-10">
              <p class="text-xs text-gray-500 font-medium flex items-center gap-1">
                <span class="material-symbols-rounded text-[14px]">calendar_today</span>
                ${dateStr}
              </p>
              <span class="text-xs font-bold text-orange-500 flex items-center gap-1">
                Details <span class="material-symbols-rounded text-[14px]">chevron_right</span>
              </span>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    // --- Tracking Modal ---
    const tModal = document.getElementById('trackingModal');
    const tModalContent = document.getElementById('trackingModalContent');
    const tResults = document.getElementById('trackingResultsTarget');

    function openShipmentModal(type, index) {
      const pkg = window[`_pkg_${type}_${index}`];
      if(!pkg) return;
      
      const inputId = getVal(pkg, ['booking', 'tracking', 'id', 'reference'], '').toUpperCase();
      
      tModal.classList.remove('opacity-0', 'pointer-events-none');
      if(window.innerWidth < 768) {
        tModalContent.classList.remove('translate-y-full'); 
      } else {
        tModalContent.classList.remove('translate-y-8');
      }

      renderModalDetails(pkg, inputId);
    }

    function closeTrackingModal() {
      tModal.classList.add('opacity-0', 'pointer-events-none');
      if(window.innerWidth < 768) {
        tModalContent.classList.add('translate-y-full');
      } else {
        tModalContent.classList.add('translate-y-8');
      }
    }

    tModal.addEventListener('click', (e) => {
      if(e.target === tModal) closeTrackingModal();
    });

    function renderModalDetails(pkgData, inputId) {
      const currentStatus = pkgData._extractedStatus;
      const pData = pkgData._prog;
      const origin = convertFlagToCountry(getVal(pkgData, ['origin', 'from', 'departure'], '—'));
      const dest = convertFlagToCountry(getVal(pkgData, ['destination', 'to', 'arrival'], '—'));
      const pieces = getVal(pkgData, ['pieces', 'qty', 'quantity', 'boxes'], '—');
      const weight = getVal(pkgData, ['weight', 'kg', 'kgs'], '—');
      const agent = getVal(pkgData, ['agent', 'forwarder', 'forwarding', 'carrier'], 'Nuvana.ex Network');
      const shipper = getVal(pkgData, ['shipper', 'sender'], '—');
      
      let dod = getVal(pkgData, ['dod', 'date of delivery', 'delivered on'], '');
      dod = dod ? formatOnlyDate(dod) : '';
      
      let logs = pkgData['Tracking_Logs'] || [];
      const isErr = pData.step === 0;
      const isDelivered = pData.step === 4;

      let html = `
        <div class="flex flex-col justify-between items-start border-b border-gray-100 pb-5 mb-6 gap-3">
          <div>
            <p class="text-gray-400 text-[10px] font-bold uppercase tracking-[0.2em] mb-1">Tracking Reference</p>
            <h3 class="text-2xl md:text-3xl font-extrabold tracking-tight text-gray-900">${inputId}</h3>
          </div>
          <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg font-bold text-xs shadow-sm border ${pData.bg}">
            <span class="material-symbols-rounded text-base">${pData.icon}</span>
            <span>${currentStatus}</span>
          </div>
        </div>

        <div class="bg-gray-50 border border-gray-100 rounded-2xl p-5 mb-6 relative overflow-hidden shadow-inner">
          <div class="flex justify-between items-center relative z-10 mb-8">
            <div class="w-[40%]">
              <p class="text-gray-400 text-[10px] uppercase tracking-widest font-bold mb-1">Origin</p>
              <h2 class="text-lg md:text-xl font-black text-gray-800 truncate" title="${origin}">${origin}</h2>
            </div>
            <div class="w-[20%] flex flex-col items-center text-gray-300">
              <span class="material-symbols-rounded text-2xl text-orange-400">flight_takeoff</span>
              <div class="w-full border-t-2 border-dashed border-gray-300 mt-1"></div>
            </div>
            <div class="w-[40%] text-right">
              <p class="text-gray-400 text-[10px] uppercase tracking-widest font-bold mb-1">Dest</p>
              <h2 class="text-lg md:text-xl font-black text-gray-800 truncate" title="${dest}">${dest}</h2>
            </div>
          </div>

          <!-- Flex Progress Bar Light Mode -->
          <div class="relative w-full flex justify-between items-center z-10 px-0 mt-6 mb-2">
            <!-- Background Track -->
            <div class="absolute left-0 w-full top-1/2 h-1.5 bg-gray-200 -translate-y-1/2 rounded-full z-0"></div>
            <!-- Active Track -->
            <div class="absolute left-0 top-1/2 h-1.5 -translate-y-1/2 rounded-full z-0 transition-all duration-1000 ease-out" 
                 style="width: ${pData.w}%; background: ${pData.c};"></div>
            
            ${[
              { label: 'Origin', s: 1 }, 
              { label: 'Transit', s: 2 }, 
              { label: 'Last Mile', s: 3 }, 
              { label: 'Delivered', s: 4 }
            ].map(node => {
              const isActive = pData.step === node.s && !isErr;
              const isPast = pData.step > node.s || (isErr && node.s === 1); 
              
              let dotClass = "w-5 h-5 md:w-7 md:h-7 rounded-full flex items-center justify-center z-10 transition-all duration-500 relative bg-white border-2 border-gray-300";
              let dotStyle = "";
              let innerContent = "";

              if (isErr && pData.step === 0 && node.s > 1) {
                 // Future nodes on error remain gray
              } else if (isErr) {
                 dotClass = "w-5 h-5 md:w-7 md:h-7 rounded-full flex items-center justify-center z-10 relative shadow-sm border border-red-500";
                 dotStyle = `background: #fef2f2;`;
                 innerContent = `<span class="material-symbols-rounded text-red-500 text-[14px] md:text-[18px] font-black">close</span>`;
              } else if (isPast) {
                dotClass = "w-5 h-5 md:w-7 md:h-7 rounded-full flex items-center justify-center z-10 relative shadow-sm border border-transparent";
                dotStyle = `background: ${pData.c};`;
                innerContent = `<span class="material-symbols-rounded text-white text-[14px] md:text-[18px] font-black">check</span>`;
              } else if (isActive) {
                dotClass = "w-5 h-5 md:w-7 md:h-7 rounded-full flex items-center justify-center z-10 relative border-[2px] border-orange-500 bg-white";
                innerContent = `<div class="w-2 h-2 md:w-2.5 md:h-2.5 rounded-full animate-pulse" style="background: ${pData.c};"></div>`;
              }

              let textClass = (isActive || isPast || isErr) ? "text-gray-900 font-bold" : "text-gray-400 font-medium";
              
              return `
              <div class="flex flex-col items-center relative z-10 bg-gray-50 p-1 rounded-full">
                <div class="${dotClass}" style="${dotStyle}">${innerContent}</div>
                <span class="absolute top-8 md:top-10 text-[9px] md:text-[10px] uppercase tracking-widest ${textClass} whitespace-nowrap text-center">${node.label}</span>
              </div>
              `;
            }).join('')}
          </div>
          <div class="h-8 md:h-10"></div> 
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
          <div class="bg-white border border-gray-200 p-3 rounded-xl shadow-sm">
            <p class="text-gray-400 text-[9px] font-bold uppercase tracking-widest mb-1 flex items-center gap-1"><span class="material-symbols-rounded text-[12px]">scale</span> Weight & Pcs</p>
            <h4 class="text-xs font-bold text-gray-800">${weight} | ${pieces} Box</h4>
          </div>
          <div class="bg-white border border-gray-200 p-3 rounded-xl shadow-sm">
            <p class="text-gray-400 text-[9px] font-bold uppercase tracking-widest mb-1 flex items-center gap-1"><span class="material-symbols-rounded text-[12px]">local_shipping</span> Carrier</p>
            <h4 class="text-xs font-bold text-gray-800 truncate" title="${agent}">${agent}</h4>
          </div>
        </div>
      `;

      if (logs.length > 0) {
        html += `
          <div class="mt-8 border-t border-gray-100 pt-6">
            <h4 class="text-xs font-bold uppercase tracking-widest text-gray-400 mb-4 flex items-center gap-2">
              <span class="material-symbols-rounded text-base">history</span> Tracking History
            </h4>
            <div class="timeline-container">
        `;
        
        [...logs].reverse().forEach((log, idx) => {
          const isLatest = idx === 0;
          const dtStr = log['Adjusted Date/Time'] || log['Adjusted Date'] || log['Date'] || log['Timestamp'] || '';
          
          const dateVal = formatOnlyDate(dtStr);
          const timeVal = extractTime(dtStr);
          
          const locVal = convertFlagToCountry(log['Location'] || log['Facility'] || log['City'] || '');
          const statVal = log['Status'] || log['Update'] || log['Event'] || 'System Update';
          const descVal = log['Description'] || log['Remarks'] || log['Details'] || '';
          
          html += `
            <div class="timeline-item ${isLatest ? 'latest' : 'opacity-80'}">
              <div class="timeline-dot"></div>
              <div class="pl-3 pb-1">
                <div class="flex items-center gap-1.5 mb-1.5 flex-wrap">
                  <span class="text-[10px] font-bold text-orange-600 bg-orange-50 px-2 py-0.5 rounded border border-orange-100 flex items-center gap-1">
                    <span class="material-symbols-rounded text-[10px]">calendar_month</span> ${dateVal}
                  </span>
                  ${timeVal ? `
                  <span class="text-[10px] font-bold text-gray-600 bg-gray-100 px-2 py-0.5 rounded border border-gray-200 flex items-center gap-1">
                    <span class="material-symbols-rounded text-[10px]">schedule</span> ${timeVal}
                  </span>
                  ` : ''}
                  ${locVal ? `
                  <span class="text-[10px] font-bold text-gray-500 bg-gray-50 px-2 py-0.5 rounded border border-gray-200 flex items-center gap-1">
                    <span class="material-symbols-rounded text-[10px]">pin_drop</span> ${locVal}
                  </span>` : ''}
                </div>
                <h4 class="text-base font-extrabold text-gray-900 mb-1 leading-tight">${statVal}</h4>
                ${descVal ? `
                  <div class="bg-gray-50 border border-gray-200 rounded-lg p-2.5 text-xs text-gray-600 font-medium inline-block max-w-full mt-1 leading-snug">
                    ${descVal}
                  </div>
                ` : ''}
              </div>
            </div>
          `;
        });
        
        html += `</div></div>`;
      } else {
        html += `
          <div class="text-center p-6 bg-gray-50 rounded-xl border border-gray-100 mt-6">
            <span class="material-symbols-rounded text-3xl text-gray-300 mb-1 block">hourglass_empty</span>
            <p class="text-gray-500 text-xs font-medium">No history logs available.</p>
          </div>
        `;
      }

      tResults.innerHTML = html;
    }
  </script>
</body>
</html>
